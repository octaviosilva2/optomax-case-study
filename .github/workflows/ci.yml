# CI mínimo — gate de qualidade para push/PR em `main`.
# Roda em sequência: checagem de tipos, testes unitários e build de produção.
# Playwright/Lighthouse ficam FORA deste gate (viram job noturno separado depois).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela execuções antigas do mesmo ref quando chega um push novo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    # Placeholders públicos: o build só precisa que as vars EXISTAM (os clients
    # Supabase são instanciados em runtime, não no build). Nada de segredo aqui.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      # Desliga o wrapper do Sentry no build (sem token não sobe source maps).
      NEXT_PUBLIC_SENTRY_DSN: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npm run test

      - name: Build (next build)
        run: npm run build
